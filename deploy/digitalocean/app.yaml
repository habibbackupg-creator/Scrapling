name: scrapling-ui
region: nyc
services:
- name: web
  environment_slug: python
  github:
    repo: D4Vinci/Scrapling
    branch: main
    deploy_on_push: true
  instance_count: 1
  instance_size_slug: basic-xxs
  http_port: 8000
  run_command: bash deploy/digitalocean/run_scrapling.sh ui
  envs:
  - key: PYTHONUNBUFFERED
    value: "1"
  - key: PORT
    value: "8000"
